<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Chart · Pie</title>
<link rel="stylesheet" href="../fonts.css">
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" id="theme-link" href="../themes/minimal-white.css">
<link rel="stylesheet" href="../animations/animations.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head><body class="single">
<div class="deck"><section class="slide is-active" data-title="Pie chart">
  <p class="kicker">Chart · Donut chart</p>
  <h2 class="h2">Where does the time go</h2>
  <div class="grid g2 mt-l" style="align-items:center">
    <div class="card" style="height:460px;padding:28px"><canvas id="c"></canvas></div>
    <div class="card">
      <h4>Takeaways</h4>
      <p class="dim">More than half the time is spent writing content. Animations are only 5%, proving reusable templates are worthwhile.</p>
      <ul class="mt-m dim">
        <li>✍️ Write content &nbsp; 55%</li><li>🧩 Pick layout &nbsp; 18%</li><li>🎨 Style tuning &nbsp; 14%</li>
        <li>📸 Export &nbsp; 8%</li><li>✨ Animation &nbsp; 5%</li>
      </ul>
    </div>
  </div>
  <script>
    addEventListener('DOMContentLoaded',()=>{
      const css=getComputedStyle(document.documentElement);
      const colors=['--accent','--accent-2','--accent-3','--good','--warn'].map(k=>css.getPropertyValue(k).trim());
      const text2=css.getPropertyValue('--text-2').trim();
      new Chart(document.getElementById('c'),{type:'doughnut',
        data:{labels:['Write content','Pick layout','Style tuning','Export','Animation'],
          datasets:[{data:[55,18,14,8,5],backgroundColor:colors,borderWidth:0}]},
        options:{cutout:'62%',plugins:{legend:{position:'right',labels:{color:text2}}}}});
    });
  </script>
</section></div>
<script src="../runtime.js"></script>
</body></html>
