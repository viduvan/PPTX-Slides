# ═══════════════════════════════════════════════════════════
# PPTX-Slides Multi-Agent — Docker Compose
# n8n (queue mode) + Agent Services + Shared DB
# ═══════════════════════════════════════════════════════════

services:
  # ─── INFRASTRUCTURE ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:0.6.2-pg15
    container_name: pptx-slides-postgres
    restart: always
    ports:
      - "3004:5432"
    command: postgres -c max_connections=300
    environment:
      - POSTGRES_DB=${DB_POSTGRESDB_DATABASE:-pptx_slides}
      - POSTGRES_USER=${DB_POSTGRESDB_USER:-pptx}
      - POSTGRES_PASSWORD=${DB_POSTGRESDB_PASSWORD:-pptx}
    volumes:
      - ./database/postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pptx-slides-network

  redis:
    image: redis:7.2.4
    container_name: pptx-slides-redis
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-redis123}
      --maxmemory 2048mb --maxmemory-policy allkeys-lru
    env_file:
      - .env
    networks:
      - pptx-slides-network
    restart: always

  # ─── N8N (queue mode) ───────────────────────────────────
  n8n:
    image: docker.io/n8nio/n8n:1.116.0
    container_name: pptx-slides-n8n
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - ./database/n8n_data_postgres:/home/node/.n8n
    env_file:
      - .env
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE:-pptx_slides}
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER:-pptx}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-pptx}
      - DB_POSTGRESDB_SCHEMA=n8n
      - WEBHOOK_URL=http://n8n:5678
    networks:
      - pptx-slides-network
    depends_on:
      - postgres
      - redis

  n8n-worker:
    image: docker.io/n8nio/n8n:1.116.0
    restart: always
    command: worker
    volumes:
      - ./database/n8n_data_postgres:/home/node/.n8n
    env_file:
      - .env
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE:-pptx_slides}
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER:-pptx}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-pptx}
      - DB_POSTGRESDB_SCHEMA=n8n
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=5
    networks:
      - pptx-slides-network
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: ${N8N_WORKER_REPLICAS:-3}

  # ─── API GATEWAY (thin proxy, no LLM) ────────────────────
  api:
    build: ./docker/api
    container_name: pptx-slides-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_POSTGRESDB_USER:-pptx}:${DB_POSTGRESDB_PASSWORD:-pptx}@postgres:5432/${DB_POSTGRESDB_DATABASE:-pptx_slides}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
      - FRONTEND_DIR=/app/frontend
    volumes:
      - shared_data:/data
      - ./frontend:/app/frontend:ro
      - ./html-assets:/app/html-assets:ro
    networks:
      - pptx-slides-network
    depends_on:
      - postgres
      - n8n

  # ─── AGENT SERVICES (data processors, no LLM) ─────────────
  analyst:
    build: ./docker/analyst
    container_name: pptx-slides-analyst
    restart: always
    volumes:
      - shared_data:/data
    networks:
      - pptx-slides-network

  writer:
    build: ./docker/writer
    container_name: pptx-slides-writer
    restart: always
    volumes:
      - shared_data:/data
    networks:
      - pptx-slides-network

  designer:
    build: ./docker/designer
    container_name: pptx-slides-designer
    restart: always
    environment:
      - PIXABAY_API_KEY=${PIXABAY_API_KEY}
    volumes:
      - shared_data:/data
    networks:
      - pptx-slides-network

  exporter:
    build: ./docker/exporter
    container_name: pptx-slides-exporter
    restart: always
    environment:
      - HTML_ASSETS_DIR=/app/html-assets
    volumes:
      - shared_data:/data
      - ./html-assets:/app/html-assets:ro
    networks:
      - pptx-slides-network

volumes:
  shared_data:

networks:
  pptx-slides-network:
    driver: bridge
