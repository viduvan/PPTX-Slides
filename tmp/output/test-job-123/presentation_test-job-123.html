<!DOCTYPE html>
<html lang="en" data-theme="tokyo-night">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Slide</title>
<link rel="stylesheet" href="assets/fonts.css">
<link rel="stylesheet" href="assets/base.css">
<link rel="stylesheet" id="theme-link" href="assets/themes/tokyo-night.css">
<link rel="stylesheet" href="assets/animations/animations.css">
</head>
<body>
<div class="deck" data-themes="tokyo-night,aurora,minimal-white,dracula,catppuccin-mocha,corporate-clean" data-theme-base="assets/themes/">

  <section class="slide is-active" data-title="Welcome Slide">
    <div class="deck-header"><span class="eyebrow">Presentation</span></div>
    <div class="anim-stagger-list">
      <h1 class="h1">Welcome Slide</h1>
      <p class="lede">Introductory content for the test presentation.</p>
      <div class="row wrap mt-l"><span class="pill">Introductory content for the test presentation.</span></div>
    </div>
    <div class="deck-footer"><span class="dim2">PPTX-Slides</span><span class="slide-number" data-current="1.0" data-total="2"></span></div>
    <div class="notes">Hello everyone.</div>
  </section>
  <section class="slide" data-title="Main Points">
    <h2 class="h2" data-anim="fade-up">Main Points</h2>
    <ul class="grid g1 anim-stagger-list" style="list-style:none;padding:0;margin:20px 0 0;gap:14px">
    <li class="card card-accent"><h4>Point 1: Easy integration</h4></li>
    <li class="card card-accent"><h4>Point 2: High performance</h4></li>
    <li class="card card-accent"><h4>Point 3: Scalable design</h4></li>
    </ul>
    <div class="deck-footer"><span class="dim2">PPTX-Slides</span><span class="slide-number" data-current="2.0" data-total="2"></span></div>
    <div class="notes">Here are the main points.</div>
  </section>
</div>
<script src="assets/runtime.js"></script>
</body></html>
